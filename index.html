<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World Card</title>
<style>
  :root {
    /* Paste any image URL here to set the CARD background */
    --card-bg-url: url('96a6b1e351ec68133e63733eb1835911.jpg');

    /* Paste any image URL here to set the PAGE background (use none for plain color) */
    --page-bg-url: url('73c5b2afc684e0e6bc1b9469e5120b88.jpg');
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #e9eaec;
    background-image: var(--page-bg-url);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  .frame {
    width: 340px;
    padding: 14px;
    border-radius: 44px;
    background: linear-gradient(160deg, #ffffff, #dcdde0);
    box-shadow:
      0 40px 60px rgba(0,0,0,0.18),
      0 10px 20px rgba(0,0,0,0.08),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }

  .card {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 32px;
    overflow: hidden;
    background-image: var(--card-bg-url);
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%);
  }

  .label {
    position: relative;
    z-index: 1;
    color: #ffffff;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-align: center;
    text-transform: lowercase;
  }
</style>
</head>
<body>

  <div class="frame">
    <div class="card">
      <div class="label">hello world</div>
    </div>
  </div>

</body>
</html>
