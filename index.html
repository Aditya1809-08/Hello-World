<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello World Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* CSS FALLBACK IMAGE — only used if CARD_IMAGE_URL below is left empty */
    :root {
      --top-image: url('BG1b1.png');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(ellipse 900px 700px at 50% 40%, rgba(20,20,30,0.10), transparent 70%),
        #E8E5DD;
      padding: 40px 20px;
      overflow: hidden;
    }

    .page-bg {
      position: fixed; inset: 0;
      background-size: cover;
      background-position: center;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .page-bg.active { opacity: 1; }

    /* Ambient blurred blobs behind the card */
    .blob { position: fixed; border-radius: 50%; filter: blur(70px); z-index: 0; pointer-events: none; }
    .blob-1 { width: 480px; height: 480px; background: radial-gradient(circle, rgba(59,106,255,0.65), rgba(29,59,204,0.28) 60%, transparent 75%); top: -10%; left: 50%; transform: translateX(-50%); animation: drift1 9s ease-in-out infinite alternate; }
    .blob-2 { width: 340px; height: 340px; background: radial-gradient(circle, rgba(147,94,220,0.6), rgba(91,45,204,0.25) 60%, transparent 75%); bottom: 4%; right: 12%; animation: drift2 12s ease-in-out infinite alternate-reverse; }
    .blob-3 { width: 240px; height: 240px; background: radial-gradient(circle, rgba(14,165,233,0.55), rgba(3,105,161,0.22) 60%, transparent 75%); bottom: 8%; left: 10%; animation: drift2 7s ease-in-out infinite alternate; }
    @keyframes drift1 { from{transform:translateX(-50%) translateY(0)} to{transform:translateX(-50%) translateY(40px)} }
    @keyframes drift2 { from{transform:translateY(0)} to{transform:translateY(30px)} }

    /* Wrapper holds the card plus the running-light border canvas */
    .card-wrap {
      position: relative;
      z-index: 2;
      border-radius: 26px;
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    #borderCanvas {
      position: absolute; inset: -1px;
      width: calc(100% + 2px); height: calc(100% + 2px);
      border-radius: 26px;
      pointer-events: none;
      z-index: 3;
    }

    .card {
      width: 420px;
      border-radius: 26px;
      overflow: hidden;
      background: #0c0e13;
      box-shadow:
        0 40px 80px rgba(0,0,0,0.22),
        0 8px 24px rgba(0,0,0,0.10);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Top image panel ── */
    .card-image {
      position: relative;
      height: 400px;
      background-image: var(--top-image);
      background-size: cover;
      background-position: center;
    }
    .card-image::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 60%, #0c0e13 100%);
    }
    .caption {
      position: absolute; top: 22px; left: 24px;
      color: #fff; font-size: 0.85rem; font-weight: 500;
      letter-spacing: 0.01em;
      text-shadow: 0 1px 8px rgba(0,0,0,0.35);
      z-index: 1;
    }

    /* ── Bottom dark panel ── */
    .card-body { padding: 30px 28px 26px; }

    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 0.68rem; font-weight: 600;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 14px;
    }
    .badge-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #7fa8ff; box-shadow: 0 0 6px #7fa8ff;
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.7rem;
      color: #fff;
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }

    .desc {
      font-size: 0.87rem; font-weight: 400;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      margin-bottom: 24px;
      min-height: 68px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .btn-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      background: transparent;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }
    .btn-pill:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.4); }
    .btn-pill:active { transform: scale(0.97); }

    .divider { border-top: 1px solid rgba(255,255,255,0.08); margin: 26px 0 16px; }

    .footer {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.74rem;
      color: rgba(255,255,255,0.38);
    }
    .footer .brand { color: rgba(255,255,255,0.6); font-weight: 500; }
  </style>
</head>
<body>

  <div class="page-bg" id="pageBg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card-wrap" id="cardWrap">
    <canvas id="borderCanvas"></canvas>
    <div class="card">
    <div class="card-image">
      <div class="caption">Think slow. Ship fast.</div>
    </div>

    <div class="card-body">
      <div class="badge"><span class="badge-dot"></span><span id="factLabel">Daily Thought</span></div>

      <h1>Hello, World! 👋</h1>
      <p class="desc" id="descText">Loading…</p>

      <button class="btn-pill" onclick="nextFact()">Next thought <span>→</span></button>

      <div class="divider"></div>

      <div class="footer">
        <span class="brand">hello-world.dev</span>
        <span>facts + code + curiosity</span>
      </div>
    </div>
    </div>
  </div>

  <script>
    /* ============================================================
       CARD IMAGE OVERRIDE — the photo inside the card at the top.
       Set ONE of these:
         1) A web URL:   'https://example.com/photo.jpg'
         2) A local file: 'your-photo.jpg' (must sit next to this HTML file)
         3) Leave as '' to keep using the CSS fallback image instead
    ============================================================ */
    const CARD_IMAGE_URL = '709b541fa8650cb8d560f1302bc61b0c.jpg';

    if (CARD_IMAGE_URL) {
      document.querySelector('.card-image').style.backgroundImage = `url('${CARD_IMAGE_URL}')`;
    }

    /* ============================================================
       PAGE BACKGROUND IMAGE — sits behind the whole page, under the
       blobs and the card. Set ONE of these:
         1) A web URL:   'https://example.com/backdrop.jpg'
         2) A local file: 'your-backdrop.jpg' (must sit next to this HTML file)
         3) Leave as '' for no background image (just the solid color + blobs)
    ============================================================ */
    const PAGE_BG_IMAGE_URL = 'BG1b1.png';

    if (PAGE_BG_IMAGE_URL) {
      const pageBg = document.getElementById('pageBg');
      pageBg.style.backgroundImage = `url('${PAGE_BG_IMAGE_URL}')`;
      pageBg.classList.add('active');
    }

    const facts = [
      "You are made of stardust — every atom in your body was forged inside a dying star billions of years ago. That's not poetry, that's physics.",
      "The human brain can store approximately 2.5 petabytes of information. You're literally walking around with a supercomputer between your ears.",
      "Coding is the closest thing to actual magic — you write symbols on a screen and machines obey. That's sorcery with a keyboard.",
      "Every great developer was once a beginner who refused to quit. The only difference between a novice and an expert is time and stubbornness.",
      "Sleep is a superpower. Your brain replays everything you learned during the day while you sleep, solidifying memories and solving problems.",
      "The most powerful tool you'll ever use isn't an IDE or a framework — it's curiosity. Stay curious and you'll never stop growing.",
      "You've already solved thousands of problems in your life without noticing. Programming just makes the problem-solving visible.",
    ];
    const labels = ["Space Fact","Brain Fact","Dev Wisdom","Motivation","Science Fact","Life Wisdom","Dev Mindset"];
    let current = 0;

    function showFact(idx) {
      const desc = document.getElementById('descText');
      const label = document.getElementById('factLabel');
      desc.style.opacity = 0; desc.style.transform = 'translateY(8px)';
      setTimeout(() => {
        desc.textContent = facts[idx];
        label.textContent = labels[idx];
        desc.style.opacity = 1; desc.style.transform = 'translateY(0)';
      }, 200);
    }
    function nextFact() { current = (current + 1) % facts.length; showFact(current); }

    showFact(0);
    setInterval(nextFact, 6000);

    /* ── Running light border ── */
    const wrap   = document.getElementById('cardWrap');
    const canvas = document.getElementById('borderCanvas');
    const ctx    = canvas.getContext('2d');
    const R      = 27;
    let W, H;

    function resize() {
      W = canvas.width  = wrap.offsetWidth;
      H = canvas.height = wrap.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function buildPath() {
      const r = R;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(W - r, 0);
      ctx.arcTo(W, 0, W, r, r);
      ctx.lineTo(W, H - r);
      ctx.arcTo(W, H, W - r, H, r);
      ctx.lineTo(r, H);
      ctx.arcTo(0, H, 0, H - r, r);
      ctx.lineTo(0, r);
      ctx.arcTo(0, 0, r, 0, r);
      ctx.closePath();
    }

    function perimeter() {
      return 2*(W + H) - (8 - 2*Math.PI)*R;
    }

    function pointAt(t) {
      const straights = [
        { from:[R,0],       to:[W-R, 0],   len: W-2*R },
        { from:[W, R],      to:[W, H-R],   len: H-2*R },
        { from:[W-R, H],    to:[R, H],     len: W-2*R },
        { from:[0, H-R],    to:[0, R],     len: H-2*R },
      ];
      const corners = [
        { cx:W-R, cy:R,   startA:-Math.PI/2, endA:0         },
        { cx:W-R, cy:H-R, startA:0,          endA:Math.PI/2 },
        { cx:R,   cy:H-R, startA:Math.PI/2,  endA:Math.PI   },
        { cx:R,   cy:R,   startA:Math.PI,    endA:3*Math.PI/2},
      ];

      const perim = perimeter();
      const arcLen = Math.PI/2 * R;
      const segments = [
        straights[0], corners[0],
        straights[1], corners[1],
        straights[2], corners[2],
        straights[3], corners[3],
      ];

      let dist = t * perim;
      for (let i = 0; i < segments.length; i++) {
        const seg = segments[i];
        const len = seg.len !== undefined ? seg.len : arcLen;
        if (dist <= len) {
          const p = dist / len;
          if (seg.len !== undefined) {
            return [
              seg.from[0] + (seg.to[0]-seg.from[0])*p,
              seg.from[1] + (seg.to[1]-seg.from[1])*p
            ];
          } else {
            const a = seg.startA + (seg.endA - seg.startA)*p;
            return [seg.cx + R*Math.cos(a), seg.cy + R*Math.sin(a)];
          }
        }
        dist -= len;
      }
      return [R, 0];
    }

    let prog = 0;
    const lights = [
      { offset: 0,   color2: '#5b82ff', color3: '#a855f7' },
      { offset: 0.5, color2: '#f472b6', color3: '#7b2fff' },
    ];

    function drawFrame() {
      ctx.clearRect(0, 0, W, H);

      buildPath();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();

      lights.forEach(light => {
        const t = (prog + light.offset) % 1;
        const [x, y] = pointAt(t);

        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const g2 = ctx.createRadialGradient(x, y, 0, x, y, 60);
        g2.addColorStop(0, 'rgba(160,120,255,0.55)');
        g2.addColorStop(0.4, 'rgba(91,130,255,0.22)');
        g2.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g2;
        ctx.beginPath(); ctx.arc(x, y, 60, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        ctx.save();
        const core = ctx.createRadialGradient(x, y, 0, x, y, 10);
        core.addColorStop(0, 'rgba(255,255,255,1)');
        core.addColorStop(0.3, 'rgba(180,200,255,0.85)');
        core.addColorStop(1, 'rgba(91,130,255,0)');
        ctx.fillStyle = core;
        ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        const trailLen = 0.12;
        const steps = 40;
        for (let i = 0; i < steps; i++) {
          const tp = ((t - (i/steps)*trailLen) + 1) % 1;
          const [tx, ty] = pointAt(tp);
          const alpha = (1 - i/steps) * 0.6;
          const size  = (1 - i/steps) * 3.5;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = i < steps*0.3 ? light.color2 : light.color3;
          ctx.beginPath(); ctx.arc(tx, ty, size, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }
      });

      prog = (prog + 0.003) % 1;
      requestAnimationFrame(drawFrame);
    }

    drawFrame();
  </script>

</body>
</html>
